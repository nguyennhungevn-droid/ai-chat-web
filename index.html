<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>
</head>
<body>
  <h2>Chat với AI</h2>
  <input id="input" placeholder="Nhập câu hỏi..." />
  <button onclick="send()">Gửi</button>
  <p id="output"></p>

<script>
async function send() {
  let input = document.getElementById("input").value;

  let res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key= AQ.Ab8RN6Jok7So2HoR2K6M5FYFsZeB12jN_c8H3XWwnWnFEl4qcg ", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      contents: [{ parts: [{ text: input }] }]
    })
  });

  let data = await res.json();
  document.getElementById("output").innerText =
    data.candidates[0].content.parts[0].text;
}
</script>
</body>
</html>
